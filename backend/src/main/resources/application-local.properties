# Local development profile - overrides for development
# Using trust auth or your local postgres credentials

# If your postgres has no password or different password, override here:
# spring.datasource.password=your_password

# Or use these settings for trust authentication:
spring.datasource.url=jdbc:postgresql://localhost:5432/trust_agro_db?sslmode=disable
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}

# Show SQL in dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
